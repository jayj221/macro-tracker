name: Macro Tracker Daily

on:
  schedule:
    - cron: '45 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-macro-${{ hashFiles('requirements.txt') }}

      - run: pip install -r requirements.txt

      - run: python report.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - run: python scripts/commodities.py
      - run: python scripts/currencies.py
      - run: python scripts/global_markets.py
      - run: python scripts/bonds.py

      - name: Configure git
        run: |
          git config user.name "jayj221"
          git config user.email "jayj221@users.noreply.github.com"

      - name: Commit macro report
        run: |
          git add reports/$(date +%Y-%m-%d).md
          git diff --staged --quiet || git commit -m "🌍 Macro report $(date -u '+%Y-%m-%d') — yields · dollar · bonds"

      - name: Commit commodities
        run: |
          git add data/commodities.json reports/commodities_$(date +%Y-%m-%d).md
          git diff --staged --quiet || git commit -m "🛢️ Commodities $(date -u '+%Y-%m-%d') — Gold · Oil · Silver"

      - name: Commit currencies
        run: |
          git add data/currencies.json
          git diff --staged --quiet || git commit -m "💱 FX $(date -u '+%Y-%m-%d') — EUR/USD · DXY · JPY · GBP"

      - name: Commit global markets
        run: |
          git add data/global_markets.json reports/global_$(date +%Y-%m-%d).md
          git diff --staged --quiet || git commit -m "🌐 Global markets $(date -u '+%Y-%m-%d') — S&P · Nikkei · DAX"

      - name: Commit bonds
        run: |
          git add data/bond_markets.json reports/bonds_$(date +%Y-%m-%d).md
          git diff --staged --quiet || git commit -m "📊 Bonds $(date -u '+%Y-%m-%d') — TLT · HYG · LQD spread"

      - run: git push
