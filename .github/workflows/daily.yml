name: Macro Tracker Daily Report

on:
  schedule:
    - cron: '45 21 * * 1-5'   # 5:45 PM ET weekdays
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
      - run: pip install -r requirements.txt
      - name: Generate report
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python report.py
      - name: Commit report
        run: |
          git config user.name "jayj221"
          git config user.email "jayj221@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "🌍 Macro report $(date -u '+%Y-%m-%d') — yields · gold · oil · dollar" &&
            git push
          )
